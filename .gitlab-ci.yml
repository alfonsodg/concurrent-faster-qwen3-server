# Standard CI/CD template for all Scovil repositories
# Security scans run on gitlab.com via sync
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - check
  - test
  - build
  - scan
  - deploy
  - sync
  - security
  - notify

variables:
  IMAGE_TAG: $CI_REG/$CI_PROJECT_PATH:$CI_COMMIT_TAG
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: unix:///var/run/docker.sock

# ============================================================
# CHECK STAGE — linters per language (all allow_failure: true)
# ============================================================

.python_exists:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - exists:
        - pyproject.toml
        - requirements.txt

ruff:
  stage: check
  image: python:3.14-slim
  allow_failure: true
  extends: .python_exists
  script:
    - pip install -q ruff
    - ruff check .

eslint:
  stage: check
  image: node:24-alpine
  allow_failure: true
  script:
    - npm ci --ignore-scripts
    - npx eslint .
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - exists:
        - package.json

go-lint:
  stage: check
  image: golang:1.24-alpine
  allow_failure: true
  script:
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - golangci-lint run
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - exists:
        - go.mod

rust-lint:
  stage: check
  image: rust:1.84-alpine
  allow_failure: true
  before_script:
    - apk add --no-cache musl-dev
  script:
    - rustup component add clippy
    - cargo clippy -- -D warnings
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - exists:
        - Cargo.toml

java-lint:
  stage: check
  image: maven:3.9-eclipse-temurin-21-alpine
  allow_failure: true
  script:
    - mvn -q compile -DskipTests
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - exists:
        - pom.xml

# ============================================================
# TEST STAGE — auto-detect test framework, with coverage
# ============================================================

pytest:
  stage: test
  image: python:3.14-slim
  allow_failure: true
  before_script:
    - |
      if [ -f "pyproject.toml" ]; then
        pip install -q uv && uv sync
      elif [ -f "requirements.txt" ]; then
        pip install -q -r requirements.txt
      fi
    - pip install -q pytest pytest-cov
  script:
    - pytest --tb=short -q --cov --cov-report=term --cov-report=html:coverage-html --cov-report=xml:coverage.xml || true
  coverage: '/(?i)total.*?(\d+(?:\.\d+)?%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage-html/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - exists:
        - tests/
        - test/

vitest:
  stage: test
  image: node:24-alpine
  allow_failure: true
  script:
    - npm ci --ignore-scripts
    - npx vitest run --coverage || true
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - exists:
        - vitest.config.ts
        - vitest.config.js
        - vite.config.ts

# ============================================================
# BUILD STAGE — Docker image on tag + auto-changelog
# ============================================================

changelog:
  stage: build
  image: alpine:latest
  script:
    - apk add --no-cache git curl
    - curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-musl.tar.gz | tar xz
    - ./git-cliff -o CHANGELOG.md --tag $CI_COMMIT_TAG
    - echo "Generated changelog for $CI_COMMIT_TAG"
    - cat CHANGELOG.md | head -30
  artifacts:
    paths:
      - CHANGELOG.md
    expire_in: 90 days
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG_MESSAGE != "deploy"

build-container:
  stage: build
  image: docker:27
  script:
    - docker login -u "$CI_USER" -p "$CI_PWD" $CI_REG
    - docker build -t $IMAGE_TAG -f Dockerfile .
    - docker push $IMAGE_TAG
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG_MESSAGE != "deploy"
  retry:
    max: 2
    when: runner_system_failure

# ============================================================
# SCAN STAGE — Trivy + SonarQube
# ============================================================

trivy-scan:
  stage: scan
  image: docker:27
  allow_failure: true
  script:
    - docker login -u "$CI_USER" -p "$CI_PWD" $CI_REG
    - docker run --rm
        -v /var/run/docker.sock:/var/run/docker.sock
        aquasec/trivy:latest image
        --severity HIGH,CRITICAL
        --exit-code 0
        --format table
        $IMAGE_TAG
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG_MESSAGE != "deploy"
  needs:
    - build-container

sonarqube:
  stage: scan
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  allow_failure: true
  variables:
    GIT_DEPTH: 0
  script:
    - sonar-scanner
        -Dsonar.projectKey=${CI_PROJECT_PATH_SLUG}
        -Dsonar.projectName="${CI_PROJECT_TITLE}"
        -Dsonar.sources=.
        -Dsonar.host.url=${SONAR_HOST_URL}
        -Dsonar.token=${SONAR_TOKEN}
        -Dsonar.qualitygate.wait=false
        -Dsonar.scm.provider=git
        -Dsonar.gitlab.project_id=${CI_PROJECT_ID}
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $SONAR_TOKEN && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")

import_sonar_issues:
  stage: security
  image: alpine:latest
  allow_failure: true
  script:
    - apk add --no-cache curl jq
    - |
      PROJECT_KEY="${CI_PROJECT_PATH_SLUG}"
      PAGE=1
      CREATED=0
      SKIPPED=0
      while true; do
        RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" \
          "${SONAR_HOST_URL}/api/issues/search?componentKeys=${PROJECT_KEY}&resolved=false&severities=BLOCKER,CRITICAL&types=BUG,VULNERABILITY&ps=100&p=${PAGE}")
        TOTAL=$(echo "$RESPONSE" | jq -r '.total')
        [ "$TOTAL" = "0" ] && echo "No BLOCKER/CRITICAL issues found" && exit 0
        echo "$RESPONSE" | jq -c '.issues[]' | while read -r ISSUE; do
          RULE=$(echo "$ISSUE" | jq -r '.rule')
          MSG=$(echo "$ISSUE" | jq -r '.message')
          SEV=$(echo "$ISSUE" | jq -r '.severity')
          TYPE=$(echo "$ISSUE" | jq -r '.type')
          FILE=$(echo "$ISSUE" | jq -r '.component' | sed "s|${PROJECT_KEY}:||")
          LINE=$(echo "$ISSUE" | jq -r '.line // "?"')
          TITLE="[SonarQube ${SEV}] ${TYPE}: ${MSG}"
          TITLE_SHORT=$(echo "$TITLE" | head -c 200)
          EXISTING=$(curl -s -H "PRIVATE-TOKEN: ${CI_PERSONAL_TOKEN}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues?search=$(echo "$RULE" | jq -Rr @uri)&state=opened&per_page=1" | jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            SKIPPED=$((SKIPPED + 1))
            continue
          fi
          BODY="## SonarQube Finding\n\n- **Rule**: ${RULE}\n- **Severity**: ${SEV}\n- **Type**: ${TYPE}\n- **File**: \`${FILE}:${LINE}\`\n- **Message**: ${MSG}\n\n[View in SonarQube](${SONAR_HOST_URL}/project/issues?id=${PROJECT_KEY}&open=$(echo "$ISSUE" | jq -r '.key'))"
          curl -s -o /dev/null -X POST -H "PRIVATE-TOKEN: ${CI_PERSONAL_TOKEN}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues" \
            --data-urlencode "title=${TITLE_SHORT}" \
            --data-urlencode "description=${BODY}" \
            -d "labels=sonarqube,auto-generated,priority::high"
          CREATED=$((CREATED + 1))
        done
        PAGES=$(( (TOTAL + 99) / 100 ))
        [ "$PAGE" -ge "$PAGES" ] && break
        PAGE=$((PAGE + 1))
      done
      echo "Created: ${CREATED}, Skipped (duplicates): ${SKIPPED}"
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $SONAR_TOKEN && $CI_PERSONAL_TOKEN && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")

# --- K8s manifests generation (for client clusters like Huawei CCE) ---
generate-k8s-manifests:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache envsubst
    - mkdir -p k8s-output
    - |
      for f in k8s/*.yaml k8s/*.yml; do
        [ -f "$f" ] || continue
        envsubst < "$f" > "k8s-output/$(basename $f)"
      done
    - echo "Generated manifests for $CI_COMMIT_TAG:"
    - ls -la k8s-output/
  artifacts:
    paths:
      - k8s-output/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG_MESSAGE != "deploy"
      exists:
        - k8s/

# ============================================================
# DEPLOY STAGE — SSH deploy + health check
# ============================================================

deploy-production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$REMOTE_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan -H "$REMOTE_IP" >> ~/.ssh/known_hosts
    - ssh $REMOTE_USER@$REMOTE_IP "docker service update --update-parallelism 1 --update-delay 10s --update-failure-action=rollback --image $IMAGE_TAG $REMOTE_SERVICE"
    - |
      if [ -n "$HEALTH_URL" ]; then
        sleep 10
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
        [ "$STATUS" = "200" ] && echo "✅ Health check passed" || echo "⚠️ Health check returned $STATUS"
      fi
  rules:
    - if: $CI_COMMIT_TAG_MESSAGE == "deploy"

# ============================================================
# SYNC STAGE — push to gitlab.com for security scanning
# ============================================================

sync_to_gitlab_cloud:
  stage: sync
  image: alpine:latest
  variables:
    GIT_DEPTH: 0
  script:
    - apk add --no-cache git openssh-client
    - eval $(ssh-agent -s)
    - echo "$GITLAB_COM_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - git remote add cloud git@gitlab.com:${GITLAB_CLOUD_GROUP:-ccvass}/${CI_PROJECT_NAME}.git 2>/dev/null || true
    - git push cloud HEAD:refs/heads/${CI_COMMIT_REF_NAME} --force
  rules:
    - if: $CI_SERVER_HOST == "scovil.labtau.com" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")
  allow_failure: true

# ============================================================
# SECURITY STAGE — import vulnerabilities as issues
# ============================================================

import_security_issues:
  stage: security
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      PROJECT_PATH="${GITLAB_CLOUD_GROUP:-ccvass}/${CI_PROJECT_NAME}"
      ENCODED_PATH=$(echo "$PROJECT_PATH" | sed 's|/|%2F|g')

      EXISTING=$(curl -s -H "PRIVATE-TOKEN: $CI_PERSONAL_TOKEN" \
        "https://scovil.labtau.com/api/v4/projects/$CI_PROJECT_ID/issues?labels=security,auto-generated&per_page=100" \
        | jq -r '.[].title')

      curl -s -H "PRIVATE-TOKEN: $GITLAB_COM_TOKEN" \
        "https://gitlab.com/api/v4/projects/${ENCODED_PATH}/vulnerability_findings?severity=critical,high&per_page=100" \
        | jq -c '.[]?' | while read -r vuln; do
        TITLE=$(echo "$vuln" | jq -r '"[\(.severity)] \(.name)"')

        if echo "$EXISTING" | grep -qF "$TITLE"; then
          echo "⏭️ $TITLE (exists)"
          continue
        fi

        DESC=$(echo "$vuln" | jq -r '"**Archivo:** \(.location.file // "N/A")\n\n\(.description // "Sin descripción")"')

        curl -s --request POST \
          --header "PRIVATE-TOKEN: $CI_PERSONAL_TOKEN" \
          "https://scovil.labtau.com/api/v4/projects/$CI_PROJECT_ID/issues" \
          --data-urlencode "title=$TITLE" \
          --data-urlencode "description=$DESC" \
          --data "labels=security,auto-generated" > /dev/null
        echo "✅ $TITLE"
      done
  rules:
    - if: $CI_SERVER_HOST == "scovil.labtau.com" && $CI_COMMIT_BRANCH == "main"
      when: delayed
      start_in: 5 minutes
  allow_failure: true

# ============================================================
# NOTIFY STAGE — alert on pipeline failure
# ============================================================

notify-failure:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"text\":\"❌ Pipeline failed: *${CI_PROJECT_PATH}* (${CI_COMMIT_REF_NAME})\nJob: ${CI_JOB_NAME}\nURL: ${CI_PIPELINE_URL}\"}"
      fi
    - |
      if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
        curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "parse_mode=Markdown" \
          -d "text=❌ *Pipeline failed*%0A📦 ${CI_PROJECT_PATH}%0A🔀 ${CI_COMMIT_REF_NAME}%0A🔗 [Ver pipeline](${CI_PIPELINE_URL})"
      fi
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_failure
  allow_failure: true

# === Security jobs only on gitlab.com ===
semgrep-sast:
  rules:
    - if: $CI_SERVER_HOST == "gitlab.com"

secret_detection:
  rules:
    - if: $CI_SERVER_HOST == "gitlab.com"

gemnasium-dependency_scanning:
  rules:
    - if: $CI_SERVER_HOST == "gitlab.com"

gemnasium-python-dependency_scanning:
  rules:
    - if: $CI_SERVER_HOST == "gitlab.com"